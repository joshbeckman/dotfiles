# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: https
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor:
# When to interactively prompt. This is a global config that cannot be overridden by hostname. Supported values: enabled, disabled
prompt: enabled
# A pager program to send command output to, e.g. "less". Set the value to "cat" to disable the pager.
pager:
# Aliases allow you to create nicknames for gh commands
aliases:
    co: pr checkout
    pr-checks: |
        !printf '| Check | Status | Duration | Workflow |\n| --- | --- | ---: | --- |\n'
        gw pr checks "$@" --json name,state,workflow,link,startedAt,completedAt --jq 'def duration: if .startedAt == null or .startedAt == "0001-01-01T00:00:00Z" then "—" else ((if .completedAt == null or .completedAt == "0001-01-01T00:00:00Z" then now else (.completedAt | fromdateiso8601) end) - (.startedAt | fromdateiso8601) | floor) as $s | if $s < 60 then "\($s)s" elif $s < 3600 then "\($s / 60 | floor)m \($s % 60)s" else "\($s / 3600 | floor)h \($s % 3600 / 60 | floor)m" end end; .[] | "| [\(.name | gsub("\\|"; "\\\\|"))](\(.link)) | \(.state) | \(duration) | \((.workflow // "") | gsub("\\|"; "\\\\|")) |"'
    pr-url: '!gw pr view --json url -q .url'
    pmerge: '!gw pr comment -b "/merge"'
    pr-merged: |
        !merged_at="$(gw pr view "$@" --json mergedAt --jq '.mergedAt // empty')" || exit $?
        if [ -n "$merged_at" ]; then
          printf '%s\n' "$merged_at"
        else
          printf 'not merged\n' >&2
          exit 1
        fi
# The path to a unix socket through which send HTTP connections. If blank, HTTP traffic will be handled by net/http.DefaultTransport.
http_unix_socket:
# What web browser gh should use when opening URLs. If blank, will refer to environment.
browser:
version: "1"
