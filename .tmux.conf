set -g default-shell /bin/zsh
set-option -g default-terminal "screen-256color"

# Claude Code: Shift+Enter newlines and OSC notifications. terminal-features
# is keyed on the *outer* terminal's $TERM (xterm-ghostty), not tmux's own
# screen-256color, so xterm* matches. allow-passthrough lets OSC sequences
# from claude reach the host terminal. focus-events forwards focus in/out
# so claude can detect when ghostty loses focus.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys:hyperlinks'
set -g focus-events on

# Use C-s (control and s key at the same time) as the prefix key
unbind C-b
set -g prefix C-s

# numbering
set -g base-index 1

# mindow management
bind-key C-a last-window
bind-key - split-window -v  -c '#{pane_current_path}'
bind-key '\' split-window -h  -c '#{pane_current_path}'
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Fine adjustment (1 or 2 cursor cells per bump) via `Shift+<arrow>`
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1
# Pane zooming is bound by default to <prefix>z

set -g pane-border-status top
set -g pane-border-format "[#[fg=white]#{?pane_active,#[bold],} :#P: #T #[fg=default,nobold]]"

# session management
set -g mode-style reverse
bind-key C-j choose-tree \
  -K "#[fg=brightblack](#{mode_key_prefix}#{mode_key})#[default]" \
  -F "#{?pane_format,#{?pane_active,#[fg=green]>#[default] ,  }#{?#{&&:#{pane_title},#{&&:#{!=:#{pane_title},#{host}},#{!=:#{pane_title},#{host_short}}}},#{pane_title},#{pane_current_command}},#{?window_format,#{?window_active,#[fg=green],}#{window_name}#{window_flags}#[default],#{?session_attached,#[fg=green],}#{session_windows} windows#{?session_attached, (attached),}#[default]}}"

# status bar
set-option -g status-bg white
set-option -g status-fg default
set-option -g status-left-length 50
set-option -g status-right " #(date '+%a, %b %d - %H:%M') "

# Vim key-bindings
setw -g mode-keys vi

# Enter scroll/copy mode with prefix Space (overrides default next-layout)
bind Space copy-mode

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Use prefix C-l to clear the visible scrollback lines
bind C-l send-keys 'C-l'

# Use prefix C-k to clear the scrolled off (hidden) buffer lines
bind C-k clear-history

# set-option -g default-command "reattach-to-user-namespace -l zsh"
run-shell ~/.config/tmux/extrakto/extrakto.tmux
